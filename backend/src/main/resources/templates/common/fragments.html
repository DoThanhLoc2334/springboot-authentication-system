<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="html_head(title)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title} + ' | Auth System'"></title>

    <link rel="stylesheet" th:href="@{/css/style.css}" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>

  <body>
    <nav th:fragment="navbar" class="main-navbar">
      <div
        class="nav-container"
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 10px 20px;
          background: #333;
          color: white;
        "
      >
        <div class="nav-logo">
          <a
            th:href="@{/}"
            style="color: white; text-decoration: none; font-weight: bold"
            >🔐 AUTH SERVICE</a
          >
        </div>

        <div class="nav-links">
          <a
            th:href="@{/profile}"
            style="color: white; margin-left: 15px; text-decoration: none"
          >
            <i class="fa-solid fa-user"></i> Profile
          </a>

          <a
            th:href="@{/login}"
            style="color: white; margin-left: 15px; text-decoration: none"
            >Sign In</a
          >

          <a
            th:href="@{/register}"
            style="
              color: #00d1b2;
              margin-left: 15px;
              text-decoration: none;
              font-weight: bold;
            "
            >Register</a
          >
        </div>
      </div>
    </nav>

    <div th:fragment="html_scripts">
      <script th:src="@{/js/auth.js}"></script>

      <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </div>
  </body>
</html>
