# Database
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/auth_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=8080
spring.sql.init.mode=always

# Application
app.jwt.secret=${JWT_SECRET:change_this_dev_jwt_secret_32_chars}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:${JWT_EXPIRATION_MS:3600000}}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.seed.admin.enabled=${SEED_ADMIN_ENABLED:false}
app.seed.admin.username=${SEED_ADMIN_USERNAME:}
app.seed.admin.email=${SEED_ADMIN_EMAIL:}
app.seed.admin.password=${SEED_ADMIN_PASSWORD:}

