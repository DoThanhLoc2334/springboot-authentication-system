<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{common/fragments :: html_head('Thông tin cá nhân')}"
  ></head>

  <body>
    <div th:replace="~{common/fragments :: navbar}"></div>

    <div class="login-container">
      <h1>User Profile</h1>
      <p>Your account information</p>

      <div class="profile-details" style="text-align: left; margin-top: 20px">
        <p>
          <strong>Username:</strong>
          <span id="displayUsername">Nguyen Hoang Huy</span>
        </p>
        <p>
          <strong>Email:</strong> <span id="displayEmail">huy@example.com</span>
        </p>
        <p>
          <strong>Role:</strong>
          <span
            class="badge"
            style="
              background: #28a745;
              color: white;
              padding: 2px 8px;
              border-radius: 4px;
            "
            >USER</span
          >
        </p>
      </div>

      <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee" />

      <div class="options">
        <a href="#" class="btn-edit">Edit Profile</a>
        <a th:href="@{/login}" style="color: red">Sign out</a>
      </div>
    </div>

    <div th:replace="~{common/fragments :: html_scripts}"></div>
  </body>
</html>
