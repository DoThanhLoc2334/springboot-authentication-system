<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{common/fragments :: html_head('Access Denied')}"></head>

  <body style="background-color: #f3f4f6">
    <div th:replace="~{common/fragments :: navbar}"></div>

    <div
      class="error-container"
      style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 80vh;
        text-align: center;
        padding: 20px;
      "
    >
      <div style="font-size: 80px; color: #ef4444; margin-bottom: 20px">
        <i class="fa-solid fa-hand"></i>
      </div>

      <h1 style="font-size: 48px; color: #111827; margin-bottom: 10px">
        403 - Forbidden
      </h1>

      <p
        style="
          font-size: 18px;
          color: #4b5563;
          max-width: 500px;
          line-height: 1.6;
          margin-bottom: 30px;
        "
      >
        Sorry, <strong>Nguyen Hoang Huy</strong>. You do not have permission to
        access this page. This area is restricted to
        <strong>Administrators</strong> only.
      </p>

      <div style="display: flex; gap: 15px">
        <a
          th:href="@{/login}"
          class="btn-login"
          style="width: auto; padding: 12px 25px; background: #374151"
        >
          Switch Account
        </a>
        <a
          th:href="@{/profile}"
          style="
            padding: 12px 25px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            text-decoration: none;
            color: #374151;
            font-weight: 600;
          "
        >
          Back to Profile
        </a>
      </div>
    </div>

    <div th:replace="~{common/fragments :: html_scripts}"></div>
  </body>
</html>
