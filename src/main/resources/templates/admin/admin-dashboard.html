<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{common/fragments :: html_head('Admin Dashboard')}"></head>

  <body>
    <div th:replace="~{common/fragments :: navbar}"></div>

    <div
      class="dashboard-wrapper"
      style="padding: 40px; max-width: 1200px; margin: 0 auto"
    >
      <header
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 30px;
        "
      >
        <h1>User Management</h1>
        <button class="btn-login" style="width: auto; padding: 10px 20px">
          + Add New User
        </button>
      </header>

      <div
        style="
          background: white;
          border-radius: 8px;
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
          overflow: hidden;
        "
      >
        <table style="width: 100%; border-collapse: collapse; text-align: left">
          <thead style="background: #f4f4f4; border-bottom: 2px solid #eee">
            <tr>
              <th style="padding: 15px">ID</th>
              <th style="padding: 15px">User Info</th>
              <th style="padding: 15px">Role</th>
              <th style="padding: 15px">Login Attempts</th>
              <th style="padding: 15px">Status</th>
              <th style="padding: 15px">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr style="border-bottom: 1px solid #eee">
              <td style="padding: 15px">1</td>
              <td style="padding: 15px">
                <strong>Nguyen Hoang Huy</strong><br />
                <small>huy@example.com</small>
              </td>
              <td style="padding: 15px">
                <span
                  style="
                    background: #3b82f6;
                    color: white;
                    padding: 4px 8px;
                    border-radius: 4px;
                    font-size: 12px;
                  "
                  >ADMIN</span
                >
              </td>
              <td style="padding: 15px; text-align: center">0</td>
              <td style="padding: 15px">
                <span style="color: #10b981">● Active</span>
              </td>
              <td style="padding: 15px">
                <a
                  href="#"
                  style="
                    color: #3b82f6;
                    text-decoration: none;
                    margin-right: 10px;
                  "
                  ><i class="fa-solid fa-pen"></i
                ></a>
                <a href="#" style="color: #ef4444; text-decoration: none"
                  ><i class="fa-solid fa-trash"></i
                ></a>
              </td>
            </tr>
            <tr style="border-bottom: 1px solid #eee">
              <td style="padding: 15px">2</td>
              <td style="padding: 15px">
                <strong>Guest User</strong><br />
                <small>guest@test.com</small>
              </td>
              <td style="padding: 15px">
                <span
                  style="
                    background: #6b7280;
                    color: white;
                    padding: 4px 8px;
                    border-radius: 4px;
                    font-size: 12px;
                  "
                  >USER</span
                >
              </td>
              <td
                style="
                  padding: 15px;
                  text-align: center;
                  color: red;
                  font-weight: bold;
                "
              >
                5 (Max)
              </td>
              <td style="padding: 15px">
                <span style="color: #ef4444">● Locked</span>
              </td>
              <td style="padding: 15px">
                <button
                  title="Unlock User"
                  style="
                    border: none;
                    background: none;
                    cursor: pointer;
                    color: #10b981;
                  "
                >
                  <i class="fa-solid fa-lock-open"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div th:replace="~{common/fragments :: html_scripts}"></div>
  </body>
</html>
