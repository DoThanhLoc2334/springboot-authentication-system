<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{common/fragments :: html_head('Forgot Password')}"></head>

  <body>
    <div th:replace="~{common/fragments :: navbar}"></div>

    <div class="login-container">
      <h1>Forgot Password?</h1>
      <p>Enter your email and we'll send you a link to reset your password.</p>

      <form id="forgotPasswordForm">
        <label>Email Address</label>
        <input
          type="email"
          id="forgotEmail"
          placeholder="name@company.com"
          required
        />

        <button type="submit" class="btn-login" style="margin-top: 20px">
          Send Reset Link
        </button>
      </form>

      <p style="margin-top: 20px">
        <a th:href="@{/login}"
          ><i class="fa-solid fa-arrow-left"></i> Back to Sign In</a
        >
      </p>
    </div>

    <div th:replace="~{common/fragments :: html_scripts}"></div>
  </body>
</html>
