<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{common/fragments :: html_head('Reset Password')}"></head>

  <body>
    <div th:replace="~{common/fragments :: navbar}"></div>

    <div class="login-container">
      <h1>Set New Password</h1>
      <p>Please enter a strong password to secure your account.</p>

      <form id="resetPasswordForm">
        <label>New Password</label>
        <input
          type="password"
          id="newPassword"
          placeholder="••••••••"
          required
        />

        <label style="margin-top: 15px">Confirm New Password</label>
        <input
          type="password"
          id="confirmPassword"
          placeholder="••••••••"
          required
        />

        <button type="submit" class="btn-login" style="margin-top: 25px">
          Reset Password
        </button>
      </form>
    </div>

    <div th:replace="~{common/fragments :: html_scripts}"></div>
  </body>
</html>
